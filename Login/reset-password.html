<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña - Ciudad Limpia</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../Home/inicio.css" />
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="container">
    <div class="card">
      <header>
        <h1>Restablecer contraseña</h1>
        <p id="resetHint">Ingresa tu nueva contraseña.</p>
      </header>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">Nueva contraseña</label>
          <input id="newPassword" type="password" required minlength="6" placeholder="Mínimo 6 caracteres" />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input id="confirmPassword" type="password" required minlength="6" placeholder="Repite la contraseña" />
        </div>

        <button type="submit" id="btnReset">Guardar contraseña</button>
      </form>

      <div id="status"></div>

      <p style="text-align:center;margin:12px 0 0;">
        <a href="login.html">Volver a Login</a>
      </p>
    </div>
  </div>

  <script type="module" src="reset-password.js"></script>
</body>
</html>
