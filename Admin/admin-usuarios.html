<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Usuarios</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../Home/inicio.css">
  <link rel="stylesheet" href="admin-usuarios.css">
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="admin-layout">
    <main class="content">
      <section class="admin-dropdown-wrap">
        <details class="admin-dropdown">
          <summary>Panel Administrativo</summary>
          <nav class="admin-dropdown__menu" aria-label="Menú admin">
            <a href="admin-reportes.html">Gestión de reportes</a>
            <a href="admin-rutas.html">Gestión de rutas</a>
            <a class="active" href="admin-usuarios.html">Gestión de usuarios</a>
          </nav>
        </details>
      </section>

      <div class="topbar">
        <h1>Gestión de Usuarios</h1>
        <button id="btnRecargar" type="button">Recargar</button>
      </div>

      <div class="filtros">
        <input type="text" id="buscadorUsuario" placeholder="Buscar por nombre, correo o teléfono...">
        <select id="filtroRol">
          <option value="Todos">Todos los roles</option>
          <option value="admin">Administrador</option>
          <option value="user">Usuario</option>
        </select>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-usuarios">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usuariosBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="admin-usuarios.js"></script>
</body>
</html>
