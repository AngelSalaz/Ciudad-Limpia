<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Rutas</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../Home/inicio.css">
  <link rel="stylesheet" href="admin-rutas.css">
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="admin-layout">
    <main class="content">
      <section class="admin-dropdown-wrap">
        <details class="admin-dropdown">
          <summary>Panel Administrativo</summary>
          <nav class="admin-dropdown__menu" aria-label="Menú admin">
            <a href="admin-reportes.html">Gestión de reportes</a>
            <a class="active" href="admin-rutas.html">Gestión de rutas</a>
            <a href="admin-usuarios.html">Gestión de usuarios</a>
          </nav>
        </details>
      </section>

      <div class="topbar">
        <h1>Gestión de Rutas</h1>
        <button id="btnRecargar" type="button">Recargar</button>
      </div>

      <section class="card form-card">
        <h3>Nueva ruta</h3>
        <form id="rutaForm" class="ruta-form">
          <input type="text" id="nombreRuta" placeholder="Nombre de la ruta" required>
          <input type="hidden" id="zona" required>

          <input
            type="text"
            id="inicioCp"
            placeholder="CP inicio (5 dígitos)"
            inputmode="numeric"
            pattern="[0-9]{5}"
            maxlength="5"
            autocomplete="postal-code"
            title="Ingresa 5 dígitos"
            required
          >
          <select id="inicioColoniaSelect" required disabled>
            <option value="">Colonia inicio</option>
          </select>
          <div class="coord-row">
            <input type="text" id="inicioDireccion" placeholder="Dirección inicio">
            <button type="button" id="btnGeoInicio" class="btn-geo">Buscar coordenadas</button>
          </div>
          <input type="number" id="inicioLat" placeholder="Latitud inicio" step="any" min="-90" max="90">
          <input type="number" id="inicioLng" placeholder="Longitud inicio" step="any" min="-180" max="180">

          <input
            type="text"
            id="finCp"
            placeholder="CP fin (5 dígitos)"
            inputmode="numeric"
            pattern="[0-9]{5}"
            maxlength="5"
            autocomplete="postal-code"
            title="Ingresa 5 dígitos"
            required
          >
          <select id="finColoniaSelect" required disabled>
            <option value="">Colonia fin</option>
          </select>
          <div class="coord-row">
            <input type="text" id="finDireccion" placeholder="Dirección fin">
            <button type="button" id="btnGeoFin" class="btn-geo">Buscar coordenadas</button>
          </div>
          <input type="number" id="finLat" placeholder="Latitud fin" step="any" min="-90" max="90">
          <input type="number" id="finLng" placeholder="Longitud fin" step="any" min="-180" max="180">

          <input type="time" id="hora" required>
          <select id="dia" required>
            <option value="">Seleccionar día</option>
            <option value="Lunes">Lunes</option>
            <option value="Martes">Martes</option>
            <option value="Miercoles">Miércoles</option>
            <option value="Jueves">Jueves</option>
            <option value="Viernes">Viernes</option>
            <option value="Sabado">Sábado</option>
            <option value="Domingo">Domingo</option>
          </select>
          <button type="submit" class="btn-primary">Guardar ruta</button>
        </form>
        <p id="cpStatus" class="cp-status" aria-live="polite"></p>
        <p id="geoStatus" class="geo-status" aria-live="polite"></p>
      </section>

      <div class="filtros">
        <input type="text" id="buscadorRuta" placeholder="Buscar por nombre o zona...">
        <select id="filtroDia">
          <option value="Todos">Todos los días</option>
          <option value="Lunes">Lunes</option>
          <option value="Martes">Martes</option>
          <option value="Miercoles">Miércoles</option>
          <option value="Jueves">Jueves</option>
          <option value="Viernes">Viernes</option>
          <option value="Sabado">Sábado</option>
          <option value="Domingo">Domingo</option>
        </select>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-rutas">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Zona</th>
              <th>Día</th>
              <th>Hora</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="rutasBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal" id="modalEditarRuta" aria-hidden="true">
    <div class="modal-content">
      <h2>Editar Ruta</h2>
      <input type="hidden" id="editRutaId">
      <label>Nombre</label>
      <input type="text" id="editNombreRuta">
      <label>CP inicio</label>
      <input
        type="text"
        id="editInicioCp"
        placeholder="CP inicio (5 dígitos)"
        inputmode="numeric"
        pattern="[0-9]{5}"
        maxlength="5"
        autocomplete="postal-code"
        title="Ingresa 5 dígitos"
      >
      <label>Colonia inicio</label>
      <select id="editInicioColoniaSelect" disabled>
        <option value="">Seleccionar colonia</option>
      </select>
      <input type="hidden" id="editZona">

      <label>CP fin</label>
      <input
        type="text"
        id="editFinCp"
        placeholder="CP fin (5 dígitos)"
        inputmode="numeric"
        pattern="[0-9]{5}"
        maxlength="5"
        autocomplete="postal-code"
        title="Ingresa 5 dígitos"
      >
      <label>Colonia fin</label>
      <select id="editFinColoniaSelect" disabled>
        <option value="">Seleccionar colonia</option>
      </select>
      <label>Dirección inicio</label>
      <div class="coord-row modal-row">
        <input type="text" id="editInicioDireccion" placeholder="Dirección inicio">
        <button type="button" id="btnGeoInicioEdit" class="btn-geo">Buscar</button>
      </div>
      <label>Latitud inicio</label>
      <input type="number" id="editInicioLat" step="any" min="-90" max="90">
      <label>Longitud inicio</label>
      <input type="number" id="editInicioLng" step="any" min="-180" max="180">
      <label>Dirección fin</label>
      <div class="coord-row modal-row">
        <input type="text" id="editFinDireccion" placeholder="Dirección fin">
        <button type="button" id="btnGeoFinEdit" class="btn-geo">Buscar</button>
      </div>
      <label>Latitud fin</label>
      <input type="number" id="editFinLat" step="any" min="-90" max="90">
      <label>Longitud fin</label>
      <input type="number" id="editFinLng" step="any" min="-180" max="180">
      <label>Dia</label>
      <select id="editDia">
        <option value="Lunes">Lunes</option>
        <option value="Martes">Martes</option>
        <option value="Miercoles">Miércoles</option>
        <option value="Jueves">Jueves</option>
        <option value="Viernes">Viernes</option>
        <option value="Sabado">Sábado</option>
        <option value="Domingo">Domingo</option>
      </select>
      <label>Hora</label>
      <input type="time" id="editHora">
      <div class="modal-buttons">
        <button id="btnGuardarRuta" type="button">Guardar</button>
        <button id="btnCerrarRuta" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin-rutas.js?v=20260323-3"></script>
</body>
</html>
