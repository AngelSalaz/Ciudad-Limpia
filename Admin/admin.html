<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrador</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../Home/inicio.css">
  <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="admin-layout">
    <main class="content">
      <div class="topbar">
        <h1>Panel de Administrador</h1>
      </div>

      <section class="welcome-card">
        <h3>Bienvenido</h3>
        <p id="adminName">Cargando administrador...</p>
      </section>

      <section class="dashboard-grid">
        <a class="dashboard-card" href="admin-reportes.html">
          <h4>Gestionar reportes</h4>
          <p>Consulta incidencias, actualiza estado y da seguimiento.</p>
        </a>

        <a class="dashboard-card" href="admin-usuarios.html">
          <h4>Gestionar usuarios</h4>
          <p>Revisa datos de cuentas y ajusta roles del sistema.</p>
        </a>

        <a class="dashboard-card" href="admin-rutas.html">
          <h4>Gestionar rutas</h4>
          <p>Crea, edita o elimina rutas de recolección activas.</p>
        </a>
      </section>
    </main>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
