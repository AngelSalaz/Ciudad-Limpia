<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Reportes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../Home/inicio.css">
  <link rel="stylesheet" href="admin-reportes.css">
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="admin-layout">
    <main class="content">
      <section class="admin-dropdown-wrap">
        <details class="admin-dropdown">
          <summary>Admin Panel</summary>
          <nav class="admin-dropdown__menu" aria-label="Menu admin">
            <a class="active" href="admin-reportes.html">Gestión de reportes</a>
            <a href="admin-rutas.html">Gestión de rutas</a>
            <a href="admin-usuarios.html">Gestión de usuarios</a>
          </nav>
        </details>
      </section>

      <div class="topbar">
        <h1>Gestión de reportes</h1>
        <button id="btnRecargar" type="button">Recargar</button>
      </div>

      <div class="filtros">
        <input type="text" id="buscador" placeholder="Buscar por tipo, usuario o ubicación...">
        <select id="filtroEstado">
          <option value="Todos">Todos los estados</option>
          <option value="Pendiente">Pendiente</option>
          <option value="En proceso">En proceso</option>
          <option value="Resuelto">Resuelto</option>
        </select>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-reportes">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Usuario</th>
              <th>Ubicación</th>
              <th>Descripción</th>
              <th>Fecha</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>

      <div class="paginacion" id="paginacion"></div>
    </main>
  </div>

  <div class="modal" id="modalEditar" aria-hidden="true">
    <div class="modal-content">
      <h2>Cambiar estado</h2>

      <input type="hidden" id="editId">

      <label>Tipo</label>
      <input type="text" id="editTipo" readonly>

      <label>Usuario</label>
      <input type="text" id="editUsuario" readonly>

      <label>Ubicación</label>
      <input type="text" id="editUbicacion" readonly>

      <label>Descripción</label>
      <textarea id="editDescripcion" readonly></textarea>

      <label>Estado</label>
      <select id="editEstado">
        <option value="Pendiente">Pendiente</option>
        <option value="En proceso">En proceso</option>
        <option value="Resuelto">Resuelto</option>
      </select>

      <div class="modal-buttons">
        <button id="btnGuardar" type="button">Actualizar</button>
        <button id="btnCerrar" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin-reportes.js"></script>
</body>
</html>
