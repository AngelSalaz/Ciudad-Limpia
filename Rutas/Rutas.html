<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas - Ciudad Limpia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../Home/inicio.css">
  <link rel="stylesheet" href="Rutas.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <main class="rutas-page">
    <h1>Rutas de Recolección</h1>

    <section class="rutas-toolbar" aria-label="Buscador de rutas">
      <input type="text" id="buscarRuta" placeholder="Buscar por nombre o zona...">
      <div id="routeStatus" class="route-status">Selecciona una ruta para ver el recorrido.</div>
    </section>

    <section class="rutas-grid" aria-label="Mapa y listado de rutas">
      <div id="map" class="rutas-map"></div>
      <div id="resultado" class="rutas-results"></div>
    </section>
  </main>

   <footer class="contacto-footer">

    <div class="footer-content">

      <img src="../Imagenes/Logo.jpg" class="footer-logo" />

      <div class="footer-info">
        <p><strong>Teléfono:</strong> +52 618 526 2120</p>
        <p><strong>Email:</strong> ciudadlimpiadgo@gmail.com</p>
      </div>

    </div>

  </footer>
  
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="Rutas.js?v=20260321-1"></script>
</body>
</html>
