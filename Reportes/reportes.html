<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciudad Limpia - Reportes</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../Home/inicio.css" />
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo" />
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="container">
    <div class="card">
      <header>
        <h1>Reporte ciudadano</h1>
        <p>Registra incidencias de recoleccion en tu zona.</p>
        <p id="userName" style="font-weight: 600;"></p>
      </header>

      <form id="reportForm">
        <div class="form-group">
          <label for="usuario">Nombre del reportante</label>
          <input type="text" id="usuario" placeholder="Ej. Juan Perez" required />
        </div>

        <div class="form-group">
          <label for="tipo">Tipo de incidencia</label>
          <select id="tipo" required>
            <option value="" disabled selected>Selecciona una opcion...</option>
            <optgroup label="Servicio de recoleccion">
              <option value="Camion no paso">El camion no paso en horario</option>
              <option value="Ruta incompleta">Falta de cobertura en la calle</option>
              <option value="Derrame de residuos">Derrame de basura por el camion</option>
            </optgroup>
            <optgroup label="Focos de contaminacion">
              <option value="Tiradero clandestino">Tiradero en lote baldio</option>
              <option value="Basura acumulada">Contenedores publicos saturados</option>
              <option value="Animal muerto">Presencia de animal muerto</option>
              <option value="Escombros">Acumulacion de escombros o muebles</option>
            </optgroup>
            <optgroup label="Mantenimiento y civismo">
              <option value="Papeleras danadas">Cestos publicos rotos</option>
              <option value="Quema de basura">Quema de residuos al aire libre</option>
              <option value="Otro">Otro caso (especificar abajo)</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group" id="otroContainer" style="display:none;">
          <label for="otroDetalle">Especifica el tipo de reporte</label>
          <input type="text" id="otroDetalle" placeholder="Escribe aqui el problema" />
        </div>

        <div class="form-group">
          <label for="ubicacion">Ubicacion exacta o zona</label>
          <input type="text" id="ubicacion" placeholder="Ej. Col. Centro, Calle Juarez #123" required />
        </div>

        <div class="form-group">
          <label for="descripcion">Descripcion del problema</label>
          <textarea id="descripcion" rows="3" placeholder="Detalla lo ocurrido..."></textarea>
        </div>

        <button type="submit" id="btnEnviar">Enviar reporte</button>
      </form>

      <div id="status"></div>
    </div>
  </div>

   <footer class="contacto-footer">

    <div class="footer-content">

      <img src="../Imagenes/Logo.jpg" class="footer-logo" />

      <div class="footer-info">
        <p><strong>Teléfono:</strong> +52 618 526 2120</p>
        <p><strong>Email:</strong> ciudadlimpiadgo@gmail.com</p>
      </div>

    </div>

  </footer>
  
  <script type="module" src="reportes.js"></script>
</body>
</html>
