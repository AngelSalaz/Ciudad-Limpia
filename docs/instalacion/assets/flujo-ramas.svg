<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <style>
      .t { font: 16px monospace; fill: #0b1b10; }
      .h { font: 22px monospace; font-weight: 700; fill: #0b1b10; }
      .box { fill: #ffffff; stroke: #2d5a27; stroke-width: 3; rx: 16; }
      .boxg { fill: #f4f7f6; stroke: #2d5a27; stroke-width: 3; rx: 16; }
      .arrow { stroke: #2d5a27; stroke-width: 3; fill: none; marker-end: url(#m); }
      .tag { font: 14px monospace; fill: #2d5a27; }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d5a27"/>
    </marker>
  </defs>

  <rect x="28" y="20" width="1144" height="600" class="boxg"/>
  <text x="56" y="62" class="h">Flujo de ramas recomendado (feature -&gt; develop -&gt; main)</text>

  <!-- main -->
  <rect x="120" y="120" width="960" height="90" class="box"/>
  <text x="150" y="160" class="h">main</text>
  <text x="260" y="160" class="t">Estable / Produccion (solo PR)</text>
  <text x="150" y="190" class="tag">Tag: v2.19.0, v2.19.1, v2.20.0, ...</text>

  <!-- develop -->
  <rect x="120" y="260" width="960" height="90" class="box"/>
  <text x="150" y="300" class="h">develop</text>
  <text x="290" y="300" class="t">Integracion / QA (PR desde feature/*)</text>

  <!-- feature branches -->
  <rect x="120" y="410" width="280" height="90" class="box"/>
  <text x="150" y="450" class="h">feature/admin-*</text>
  <text x="150" y="478" class="t">Cambio acotado</text>

  <rect x="460" y="410" width="280" height="90" class="box"/>
  <text x="490" y="450" class="h">feature/reportes-*</text>
  <text x="490" y="478" class="t">Cambio acotado</text>

  <rect x="800" y="410" width="280" height="90" class="box"/>
  <text x="830" y="450" class="h">feature/rutas-*</text>
  <text x="830" y="478" class="t">Cambio acotado</text>

  <!-- Arrows feature -> develop -->
  <path class="arrow" d="M 260 410 L 260 350"/>
  <path class="arrow" d="M 600 410 L 600 350"/>
  <path class="arrow" d="M 940 410 L 940 350"/>

  <!-- Arrow develop -> main -->
  <path class="arrow" d="M 600 260 L 600 210"/>

  <!-- Notes -->
  <text x="120" y="548" class="t">Politica recomendada:</text>
  <text x="120" y="574" class="t">1) Proteger main (sin push directo). 2) PR obligatorio. 3) Versionar con tags en main.</text>
</svg>

