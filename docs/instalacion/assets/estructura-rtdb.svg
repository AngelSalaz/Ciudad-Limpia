<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .t { font: 16px monospace; fill: #0b1b10; }
      .h { font: 22px monospace; font-weight: 700; fill: #0b1b10; }
      .box { fill: #ffffff; stroke: #2d5a27; stroke-width: 3; rx: 16; }
      .bg { fill: #f4f7f6; stroke: #2d5a27; stroke-width: 3; rx: 16; }
      .line { stroke: #2d5a27; stroke-width: 3; }
    </style>
  </defs>

  <rect x="28" y="20" width="1144" height="500" class="bg"/>
  <text x="56" y="62" class="h">Realtime Database - Estructura (alto nivel)</text>

  <rect x="80" y="110" width="420" height="370" class="box"/>
  <text x="110" y="150" class="t">/users</text>
  <text x="110" y="178" class="t">  /{uid}</text>
  <text x="110" y="206" class="t">    nombre</text>
  <text x="110" y="234" class="t">    telefono</text>
  <text x="110" y="262" class="t">    direccion</text>
  <text x="110" y="290" class="t">    role (admin/user)</text>
  <text x="110" y="318" class="t">    /favoriteRoutes</text>
  <text x="110" y="346" class="t">      /{routeId}: true</text>

  <rect x="540" y="110" width="580" height="150" class="box"/>
  <text x="570" y="150" class="t">/reportes</text>
  <text x="570" y="178" class="t">  /{reporteId}</text>
  <text x="570" y="206" class="t">    uid (autor)</text>
  <text x="570" y="234" class="t">    tipo, descripcion, ubicacion, estado, fecha</text>

  <rect x="540" y="290" width="580" height="150" class="box"/>
  <text x="570" y="330" class="t">/rutas</text>
  <text x="570" y="358" class="t">  /{rutaId}</text>
  <text x="570" y="386" class="t">    nombre, zona, dia, hora</text>
  <text x="570" y="414" class="t">    startLat, startLng, endLat, endLng</text>

  <rect x="80" y="500" width="1040" height="40" class="box"/>
  <text x="110" y="528" class="t">/seguimientoSolicitudes (opcional): {uid}_{reporteId} - solicitud de seguimiento</text>

  <line x1="500" y1="260" x2="540" y2="180" class="line"/>
  <line x1="500" y1="320" x2="540" y2="360" class="line"/>
</svg>

